// ═══════════ CLOUD via JSONP (bypassa CORS completamente) ═══════════
window._jsonpCounter=0;
window._jsonp=function(params,cb){
  if(!window.API_URL){if(cb)cb(null);return}
  var cbName="_dcb"+(++window._jsonpCounter)+"_"+Date.now();
  var timer=setTimeout(function(){cleanup();if(cb)cb(null)},20000);
  function cleanup(){try{delete window[cbName]}catch(e){window[cbName]=undefined}
    var s=document.getElementById(cbName);if(s)s.remove();clearTimeout(timer)}
  window[cbName]=function(data){cleanup();if(cb)cb(data)};
  var qs=Object.keys(params).map(function(k){return k+"="+encodeURIComponent(params[k])}).join("&");
  var script=document.createElement("script");
  script.id=cbName;
  script.src=window.API_URL+"?"+qs+"&callback="+cbName+"&t="+Date.now();
  script.onerror=function(){cleanup();if(cb)cb(null)};
  document.head.appendChild(script);
};
window._b64=function(s){return btoa(unescape(encodeURIComponent(s)))};
window._lastSave=null;// timestamp ultimo salvataggio cloud riuscito
window._processQueue=function(){
  if(window._saving||!window._saveQueue.length)return;
  window._saving=true;var op=window._saveQueue.shift();op.retries=(op.retries||0)+1;
  function finish(ok,err){
    window._saving=false;
    if(ok){window._cloudDown=false;window._cloudErr=null;window._lastSave=Date.now();window.dispatchEvent(new Event("saveOk"))}
    else{window._cloudDown=true;window._cloudErr=err||"nessuna risposta dal server";
      try{console.warn("[DEFR] Salvataggio rifiutato:",window._cloudErr)}catch(e){}
      if(op.retries<4)window._saveQueue.push(op)}
    if(window._saveQueue.length)setTimeout(window._processQueue,ok?300:1200*op.retries);
    else{window._syncing=false;window.dispatchEvent(new Event("syncStatus"))}
  }
  if(op.action==="deleteEntry"){
    window._jsonp({action:"deleteEntry",id:op.id},function(r){finish(!!(r&&r.ok))});return}
  // Scrittura VERIFICATA via JSONP a blocchi: il server conferma ogni blocco (ok:true).
  // Nessun POST "no-cors": se un blocco fallisce, il salvataggio viene ritentato.
  var kind=op.action==="saveUsers"?"users":op.action==="saveStructure"?"structure":"entry";
  var b64=window._b64(JSON.stringify(op.data===undefined?null:op.data));
  var CH=3200;var total=Math.ceil(b64.length/CH)||1;var seq=0;
  var wid=op.id||("_"+kind);
  (function send(){
    window._jsonp({action:"put",id:wid,kind:kind,seq:seq,total:total,data:b64.substr(seq*CH,CH)},function(r){
      if(!r||r.ok===false){finish(false,r&&r.error);return}
      seq++;if(seq<total)send();else finish(true);
    });
  })();
};
window._push=function(action,id,dataObj){
  if(!window.API_URL)return;
  window._syncing=true;window.dispatchEvent(new Event("syncStatus"));
  // Nessun troncamento: POST supporta payload grandi (immagini incluse)
  window._saveQueue.push({action:action,id:id||"",data:dataObj,retries:0});
  window._processQueue();
};
window._saveLocal=function(){try{
  localStorage.setItem(window.SK,JSON.stringify(window._SUBS));
  localStorage.setItem(window.SK+"_users",JSON.stringify(window._USERS));
  localStorage.setItem(window.SK+"_sec",JSON.stringify(window._sections));
  localStorage.setItem(window.SK+"_mis",JSON.stringify(window._missioni));
  localStorage.setItem(window.SK+"_prog",JSON.stringify(window._programmi));
  if(window._customLogo)localStorage.setItem(window.SK+"_logo",window._customLogo);
}catch(e){}};
window._load=function(){
  try{
    var d=localStorage.getItem(window.SK);if(d)window._SUBS=JSON.parse(d);
    var u=localStorage.getItem(window.SK+"_users");if(u)window._USERS=JSON.parse(u);
    var s=localStorage.getItem(window.SK+"_sec");if(s)window._sections=JSON.parse(s);
    var m=localStorage.getItem(window.SK+"_mis");if(m)window._missioni=JSON.parse(m);
    var p=localStorage.getItem(window.SK+"_prog");if(p)window._programmi=JSON.parse(p);
    var lg=localStorage.getItem(window.SK+"_logo");if(lg)window._customLogo=lg;
  }catch(e){}
  if(!window._sections||!window._sections.length)window._sections=JSON.parse(JSON.stringify(window.DEFAULT_SECTIONS));
  if(!window._missioni||!window._missioni.length)window._missioni=JSON.parse(JSON.stringify(window.DEFAULT_MISSIONI));
  if(!window._programmi||!window._programmi.length)window._programmi=JSON.parse(JSON.stringify(window.DEFAULT_PROGRAMMI));
  if(!window.API_URL)return;
  window._jsonp({action:"ping"},function(r){window._cloudDown=!(r&&r.ok);window.dispatchEvent(new Event("syncStatus"))});
  window._jsonp({action:"load"},function(cloud){
    if(cloud&&Array.isArray(cloud)){
      window._cloudDown=false;
      var cl={};cloud.forEach(function(e){if(e&&e.id&&e.data)cl[e.id]=e.data});
      // cloud → locale: vince la versione più recente (timestamp)
      Object.keys(cl).forEach(function(id){var l=window._SUBS[id];
        if(!l||(cl[id].ts||0)>=(l.ts||0))window._SUBS[id]=cl[id]});
      // locale → cloud: ripubblica ciò che il cloud non ha o ha in versione più vecchia
      Object.keys(window._SUBS).forEach(function(id){var c=cl[id];var l=window._SUBS[id];
        if(!c||(l.ts||0)>(c.ts||0))window._push("upsert",id,l)});
      window._saveLocal();window.dispatchEvent(new Event("dataReloaded"))
    }else{window._cloudDown=true;window.dispatchEvent(new Event("syncStatus"))}});
  window._jsonp({action:"loadUsers"},function(u){
    window._usersChecked=true;
    if(u&&Array.isArray(u)&&u.length){window._USERS=u;window._saveLocal()}
    else if(u&&Array.isArray(u)&&!u.length&&window._USERS&&window._USERS.length){window._pushUsers()}
    window.dispatchEvent(new Event("dataReloaded"))});
  window._jsonp({action:"loadStructure"},function(st){if(st&&st.sections){window._sections=st.sections;if(st.missioni)window._missioni=st.missioni;if(st.programmi)window._programmi=st.programmi;if(st.logo)window._customLogo=st.logo;window._saveLocal();window.dispatchEvent(new Event("sectionsChanged"))}});
};
window._pushStructure=function(){window._push("saveStructure","",{sections:window._sections,missioni:window._missioni,programmi:window._programmi,logo:window._customLogo})};
window._pushUsers=function(){window._push("saveUsers","",window._USERS)};

// ═══════════ AGGIORNAMENTO LIVE DAL CLOUD (polling + focus) ═══════════
window._mergeCloudEntries=function(cloud){
  if(!cloud||!Array.isArray(cloud))return false;
  window._cloudDown=false;var changed=false;
  var pending={};window._saveQueue.forEach(function(o){if(o.id)pending[o.id]=1});
  cloud.forEach(function(e){if(!e||!e.id||!e.data)return;
    if(pending[e.id])return; // non sovrascrivere ciò che è in coda di salvataggio
    var l=window._SUBS[e.id];
    if(!l||(e.data.ts||0)>(l.ts||0)){window._SUBS[e.id]=e.data;changed=true}});
  if(changed){window._saveLocal();window.dispatchEvent(new Event("dataReloaded"))}
  return true};
window._refreshCloud=function(){
  if(!window.API_URL)return;
  if(window._saving||window._saveQueue.length)return; // prima finiscono i salvataggi
  window._jsonp({action:"load"},function(cloud){
    if(cloud){window._mergeCloudEntries(cloud);window.dispatchEvent(new Event("syncStatus"))}
    else{window._cloudDown=true;window.dispatchEvent(new Event("syncStatus"))}});
  window._jsonp({action:"loadUsers"},function(u){
    if(u&&Array.isArray(u)&&u.length&&JSON.stringify(u)!==JSON.stringify(window._USERS)){
      window._USERS=u;window._saveLocal();window.dispatchEvent(new Event("dataReloaded"))}});
  window._jsonp({action:"loadStructure"},function(st){
    if(st&&st.sections){
      var cur=JSON.stringify([window._sections,window._missioni,window._programmi]);
      var nw=JSON.stringify([st.sections,st.missioni||window._missioni,st.programmi||window._programmi]);
      if(nw!==cur){window._sections=st.sections;if(st.missioni)window._missioni=st.missioni;
        if(st.programmi)window._programmi=st.programmi;if(st.logo)window._customLogo=st.logo;
        window._saveLocal();window.dispatchEvent(new Event("sectionsChanged"))}}});
};
// Niente polling continuo: il riallineamento avviene solo quando serve,
// cioè quando la finestra torna in primo piano (1 sola richiesta) o su azione manuale.
window.addEventListener("focus",function(){window._refreshCloud()});
document.addEventListener("visibilitychange",function(){if(!document.hidden)window._refreshCloud()});
</script>

function computeNumbering(sections){

  var sez=0;var counters=[0,0,0,0];var out={};
  sections.forEach(function(s){
    var lv0=s.level||0;
    if(s.noNum||lv0===0){
      if(s.sez||/SEZIONE/i.test(s.title||"")){sez++;for(var j=0;j<4;j++)counters[j]=0}
      out[s.id]="";return}

    var parts=sez>0?[sez]:[];
