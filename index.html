{id:"premessa",title:"Premessa",level:0,hint:"Il DEFR rappresenta lo strumento fondamentale attraverso il quale la Regione definisce il quadro complessivo delle politiche pubbliche, delle priorità strategiche e della programmazione finanziaria per il prossimo triennio. Descrivere: obiettivi di finanziamento, miglioramento del Valore Pubblico, superamento isolamento territoriale, riduzione disuguaglianze, potenziamento infrastrutture, ammodernamento SSR, innovazione capacità amministrativa, tutela ambientale, indirizzi per enti e società partecipate."},
{id:"nota_met",title:"Nota Metodologica",level:0,hint:"Descrivere le fasi metodologiche seguite: 1) Raccolta contributi dalle strutture regionali (con note e documenti protocollati); 2) Aggregazione e armonizzazione dei contenuti per sezioni tematiche; 3) Eventuali strumenti utilizzati; 4) Fonti dati e riferimenti normativi (D.lgs. 118/2011, Allegato 4/1). Indicare come è garantita tracciabilità e completezza delle fonti."},
{id:"sez1",title:"SEZIONE PRIMA – Il Contesto e gli Obiettivi Strategici",level:0,type:"header",hint:"La Sezione delinea il quadro conoscitivo di riferimento attraverso un'analisi del contesto economico, sociale, finanziario e amministrativo a livello internazionale, nazionale e regionale. Consente di individuare fabbisogni, criticità e opportunità del territorio."},
{id:"s1_1_1",title:"1.1.1 Scenario internazionale",level:1,parent:"sez1",hint:"Analizzare le dinamiche macroeconomiche globali: crescita PIL mondiale, commercio internazionale, politiche monetarie (BCE, FED), inflazione, tensioni geopolitiche, transizione energetica globale. Includere dati e grafici da fonti come FMI, Banca Mondiale, OCSE, Eurostat."},
{id:"s1_1_2",title:"1.1.2 Scenario nazionale",level:1,parent:"sez1",hint:"Descrivere il contesto macroeconomico italiano: andamento PIL, occupazione, inflazione, debito pubblico, politiche fiscali (legge di bilancio), riforme strutturali, PNRR. Fare riferimento al DEF nazionale, ISTAT, Banca d'Italia. Includere tabelle con indicatori principali."},
{id:"s1_2_1",title:"1.2.1 L'analisi demografica regionale",level:1,parent:"sez1",hint:"Presentare dati sulla popolazione residente al 1° gennaio, distribuzione per fasce d'età e genere, indici di vecchiaia, dipendenza e ricambio, saldo naturale e migratorio, confronto con dato nazionale. Includere tabelle e grafici sulla piramide demografica. Fonti: ISTAT, anagrafe regionale."},
{id:"s1_2_2",title:"1.2.2 L'economia regionale",level:1,parent:"sez1",hint:"Analizzare: PIL regionale e confronto con dato nazionale, valore aggiunto per settore (agricoltura, industria, servizi), sistema produttivo e imprese (registrate, attive, natimortalità), mercato del lavoro (occupazione, disoccupazione, tasso attività per genere/età), finanza pubblica decentrata, prospettive di crescita 2026-2028. Fonti: ISTAT, Unioncamere, Banca d'Italia."},
{id:"s1_1_3",title:"1.3 Il Contesto Amministrativo Regionale",level:1,parent:"sez1",hint:"Descrivere la struttura organizzativa della Regione: organigramma, Direzioni e Servizi, dotazione organica, distribuzione del personale per categoria/qualifica/età/genere, politiche di reclutamento, formazione, digitalizzazione dell'ente. Includere tabelle sulla consistenza del personale."},
{id:"s1_2",title:"2. La Programmazione Strategica 2026/2028",level:0,type:"header",hint:"Descrivere i principali strumenti di programmazione che orientano l'azione regionale nel triennio."},
{id:"s1_2_1p",title:"2.1 Programma Regionale FESR FSE+ 2021-2027",level:1,parent:"s1_2",hint:"Descrivere il PR Molise FESR-FSE+ 2021-2027: priorità, azioni, dotazione finanziaria, stato di attuazione, articolazione della spesa nelle Missioni e Programmi del bilancio regionale. Includere tabelle con la ripartizione finanziaria per priorità/azione e la correlazione con le priorità del Governo regionale e gli SDGs."},
{id:"s1_2_2p",title:"2.2 Fondo per lo Sviluppo e la Coesione (FSC)",level:1,parent:"s1_2",hint:"Illustrare la programmazione del FSC: Accordi per la Coesione, Piano di Sviluppo e Coesione, dotazione finanziaria, interventi programmati per ambito tematico, stato di attuazione."},
{id:"s1_2_3p",title:"2.3 PSR Molise e CSRM 2023-2027",level:1,parent:"s1_2",hint:"Descrivere il Programma di Sviluppo Rurale 2014-2022 (stato di chiusura) e il Complemento per lo Sviluppo Rurale del Molise 2023-2027: priorità, misure, dotazione FEASR, interventi principali, stato di attuazione."},
{id:"s1_2_4p",title:"2.4 Il Programma Sanitario Regionale",level:1,parent:"s1_2",hint:"Illustrare: riorganizzazione rete ospedaliera, offerta sanitaria territoriale, reti cliniche, PNRR Missione 6 Salute (Case di Comunità, Ospedali di Comunità, COT, telemedicina), gestione risorse umane SSR, liste d'attesa. Includere tabelle con cronoprogramma e dotazione finanziaria."},
{id:"s1_2_5p",title:"2.5 Il Programma FEAMPAA 2021-2027",level:1,parent:"s1_2",hint:"Descrivere il Programma Fondo Europeo Affari Marittimi, Pesca e Acquacoltura: priorità, dotazione finanziaria, interventi programmati per il settore ittico regionale."},
{id:"s1_3",title:"3. Priorità nelle Missioni e Programmazione Strategica Regionale",level:0,type:"missioni",hint:"Per ogni Priorità Regionale, descrivere la Missione e i relativi Programmi con: descrizione, risorse finanziarie per fonte/anno, destinatari, risultati attesi, indicatori, riferimento SNSvS, struttura amministrativa responsabile."},
{id:"sez2",title:"SEZIONE SECONDA – La Finanza Regionale",level:0,type:"header",hint:"Fornire un'analisi dettagliata delle dinamiche finanziarie della Regione con riferimento al triennio."},
{id:"s2_1",title:"1.1 Quadro Finanziario del Settore Pubblico Allargato",level:1,parent:"sez2",hint:"Analizzare spese e entrate del Settore Pubblico Allargato (SPA) sul territorio regionale, utilizzando i dati CPT. Distinguere PA e Settore Extra PA, spese correnti e in conto capitale, entrate per tipologia. Includere tabelle e grafici comparativi."},
{id:"s2_1_2",title:"1.1.3 Le entrate regionali",level:1,parent:"sez2",hint:"Dettagliare le entrate proprie della Regione: IRPEF, IRAP, tassa automobilistica, altri tributi, compartecipazioni, trasferimenti statali ed europei. Includere serie storiche e previsioni triennali."},
{id:"s2_2",title:"2. Il Bilancio Consolidato",level:1,parent:"sez2",hint:"Presentare il bilancio consolidato dell'ultimo esercizio: risultato economico, stato patrimoniale, enti inclusi nel perimetro di consolidamento."},
{id:"s2_3",title:"3. Indebitamento",level:1,parent:"sez2",hint:"Analizzare la composizione del debito regionale: mutui, prestiti obbligazionari, quota capitale e interessi, tasso di interesse medio, sostenibilità del debito, evoluzione prevista nel triennio."},
{id:"sez3",title:"SEZIONE TERZA – Indirizzi Enti Strumentali e Società Partecipate",level:0,type:"header",hint:"Definire gli indirizzi strategici rivolti a enti strumentali, organismi controllati e società partecipate (d.lgs. 118/2011, d.lgs. 175/2016)."},
{id:"s3_1",title:"1. Enti Strumentali e Organismi Controllati",level:1,parent:"sez3",hint:"Elencare gli enti strumentali regionali, gli obiettivi generali (efficienza, economicità, trasparenza), gli obiettivi specifici per il rafforzamento del sistema dei controlli interni, come richiesto dalla Corte dei Conti."},
{id:"s3_2",title:"2. Società Partecipate Regionali",level:1,parent:"sez3",hint:"Per ogni società partecipata (Funivie Molise, GAM, Finmolise, Molise Dati, Sviluppo Italia Molise, ecc.): obiettivi strategici, obiettivi specifici, ambito di intervento, stato procedurale. Distinguere società dirette e indirette, quelle in procedura e quelle da dismettere."}
];

window._b64=function(s){return btoa(unescape(encodeURIComponent(s)))};
window._cloudGet=function(p,cb){if(!window.API_URL){if(cb)cb(null);return}var qs=Object.keys(p).map(function(k){return k+"="+encodeURIComponent(p[k])}).join("&");fetch(window.API_URL+"?"+qs+"&t="+Date.now()).then(function(r){return r.json()}).then(function(d){if(cb)cb(d)}).catch(function(){if(cb)cb(null)})};
window._processQueue=function(){if(window._saving||!window._saveQueue.length)return;window._saving=true;var op=window._saveQueue.shift();op.retries=(op.retries||0)+1;window._cloudGet(op.params,function(r){window._saving=false;if((!r||!r.ok)&&op.retries<5)window._saveQueue.unshift(op);var d=600*Math.pow(2,Math.min(op.retries-1,3));if(window._saveQueue.length)setTimeout(window._processQueue,d);else{window._syncing=false;window.dispatchEvent(new Event("syncStatus"))}})};
window._cloudSave=function(id,data){if(!window.API_URL)return;window._syncing=true;window.dispatchEvent(new Event("syncStatus"));var b=window._b64(JSON.stringify({id:id,data:data}));if((window.API_URL+"?action=upsert&id="+id+"&data="+encodeURIComponent(b)).length>7800){if(data.content&&data.content.length>3000){data=Object.assign({},data);data.content=data.content.substring(0,3000)};b=window._b64(JSON.stringify({id:id,data:data}))}window._saveQueue.push({params:{action:"upsert",id:id,data:b},retries:0});window._processQueue()};

window._saveAll=function(){try{localStorage.setItem(window.SK,JSON.stringify(window._SUBS));localStorage.setItem(window.SK+"_users",JSON.stringify(window._USERS))}catch(e){}};
window._load=function(){try{var d=localStorage.getItem(window.SK);if(d)window._SUBS=JSON.parse(d);var u=localStorage.getItem(window.SK+"_users");if(u)window._USERS=JSON.parse(u);var s=localStorage.getItem(window.SK+"_sec");if(s)window._sections=JSON.parse(s)}catch(e){}if(!window._sections||!window._sections.length)window._sections=JSON.parse(JSON.stringify(window.DEFAULT_SECTIONS));if(!window.API_URL)return;window._cloudGet({action:"load"},function(cloud){if(cloud&&Array.isArray(cloud)){cloud.forEach(function(e){if(e&&e.id&&e.data)window._SUBS[e.id]=e.data});window._saveAll();window.dispatchEvent(new Event("dataReloaded"))}});window._cloudGet({action:"loadUsers"},function(u){if(u&&Array.isArray(u)){window._USERS=u;window._saveAll()}})};

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#0066CC;--pri-dk:#17324D;--pri-lt:#4A90D9;--accent:#D63384;--ok:#008758;--warn:#A66300;--err:#CC334D;--bg:#F5F7FB;--card:#FFF;--txt:#17324D;--txt2:#5B6F82;--brd:#D6DCE3;--tbl:#1F4E79;--sh:0 1px 4px rgba(23,50,77,.08)}
body{font-family:'Titillium Web',sans-serif;background:var(--bg);color:var(--txt)}
/* HEADER */
.hdr{background:var(--pri-dk);height:52px;display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:500;gap:12px}
.hdr *{color:#fff}.hdr .logo{font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:8px}
.hdr .logo .sh{width:30px;height:30px;background:#fff;color:var(--pri-dk);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.hdr .spacer{flex:1}.hdr .meta{font-size:12px;opacity:.6}.hdr button{background:rgba(255,255,255,.12);border:none;color:#fff;padding:5px 12px;border-radius:3px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.hdr button:hover{background:rgba(255,255,255,.25)}
.hdr .dot{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block}.hdr .dot.busy{background:#ffc107;animation:bl 1s infinite}
@keyframes bl{50%{opacity:.3}}
/* LAYOUT */
.wrap{display:flex;height:calc(100vh - 52px)}
.side{width:280px;background:var(--card);border-right:1px solid var(--brd);overflow-y:auto;flex-shrink:0;font-size:13px}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.content{flex:1;padding:20px 28px;max-width:960px;width:100%}
/* SIDEBAR */
.side .slbl{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;padding:12px 14px 4px}
.si{display:flex;align-items:center;padding:7px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;gap:6px;color:var(--txt2)}
.si:hover{background:var(--bg)}.si.act{background:#E8F0FE;color:var(--pri);border-left-color:var(--pri);font-weight:600}
.si.lk{opacity:.35;cursor:not-allowed}.si .sti{font-size:12px;flex:1;line-height:1.3}
.si .bdg{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;flex-shrink:0}
.bdg.g{background:#E8F5E9;color:#2E7D32}.bdg.y{background:#FFF8E1;color:#F57F17}.bdg.r{background:#FCEAEE;color:#CC334D}
.si-add{padding:8px 14px;color:var(--pri);font-size:12px;cursor:pointer;font-weight:600;border-top:1px solid var(--brd);margin-top:4px}
.si-add:hover{background:var(--bg)}
/* SIDEBAR EDIT CONTROLS */
.si{position:relative}
.si .si-acts{display:none;position:absolute;right:4px;top:50%;transform:translateY(-50%);gap:1px;align-items:center}
.si:hover .si-acts{display:flex}
.si .si-acts button{background:transparent;border:none;cursor:pointer;font-size:11px;padding:2px 4px;border-radius:2px;color:var(--txt2);line-height:1}

  for(var ti=0;ti<tocItems.length;ti++){
